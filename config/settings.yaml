# ============================================================================
# EDGE-RAG UNIFIED CONFIGURATION
# ============================================================================
#
# Version: 3.1.0 - UNIFIED
# Author: Edge-RAG Research Project
# Last Modified: 2026-01-25
#
# CONSOLIDATION: settings.yaml + settings_kuzu.yaml → UNIFIED settings.yaml
#
# This configuration supports both KuzuDB and NetworkX graph backends.
# Select your preferred backend in the 'graph' section below.
#
# ============================================================================

# ============================================================================
# EMBEDDING MODEL
# ============================================================================
embeddings:
  # Model name (must match Ollama installed model)
  model_name: "nomic-embed-text"

  # Ollama API endpoint
  base_url: "http://localhost:11434"

  # Embedding dimensionality
  # nomic-embed-text: 768
  # all-MiniLM-L6-v2: 384
  # bge-base-en: 768
  embedding_dim: 768

  # SQLite Cache für Embedding-Ergebnisse (persistiert über Runs hinweg)
  cache_path: "./cache/embeddings.db"

# ============================================================================
# DOCUMENT CHUNKING
# ============================================================================
chunking:
  # Mode: "standard" (fixed size) or "semantic" (structure-aware)
  mode: "standard"
  
  # Standard chunking parameters
  chunk_size: 512         # Characters per chunk
  chunk_overlap: 128      # Overlap between chunks
  
  # Semantic chunking parameters (if mode="semantic")
  semantic:
    min_chunk_size: 200
    max_chunk_size: 1000
    detect_structure: true
    quality_filter: true
  
  # Content to filter out
  filter_patterns:
    - "^\\s*$"            # Empty lines
    - "^Page \\d+$"       # Page numbers
    - "^\\d+$"            # Standalone numbers

# ============================================================================
# VECTOR STORE (LanceDB)
# ============================================================================
vector_store:
  provider: "lancedb"
  db_path: "./data/vector"
  
  # Index type: "flat" (exact) or "ivfflat" (approximate, faster)
  index_type: "ivfflat"
  
  # =========================================================================
  # DISTANCE METRIC - CRITICAL SETTING
  # =========================================================================
  # Must be "cosine" for text embeddings.
  # LanceDB defaults to L2 which gives incorrect similarity scores!
  distance_metric: "cosine"
  
  # L2 normalization for numerical stability
  normalize_embeddings: true
  
  # Retrieval parameters
  top_k_vectors: 10
  similarity_threshold: 0.3    # Minimum similarity [0.0, 1.0]
  overfetch_factor: 3          # ANN candidates = top_k * overfetch_factor; filtered by threshold
  graph_text_max_chars: 500    # Max characters stored in graph node (full text in vector store)

# ============================================================================
# KNOWLEDGE GRAPH
# ============================================================================
graph:
  enabled: true
  
  # =========================================================================
  # BACKEND SELECTION
  # =========================================================================
  # Options:
  #   "kuzu"     - KuzuDB (recommended): Native Cypher, 10-100x faster
  #   "networkx" - NetworkX (fallback): Pure Python, GraphML persistence
  #
  # KuzuDB requires: pip install kuzu
  # NetworkX requires: pip install networkx
  #
  # If selected backend is unavailable, system will auto-fallback to other.
  # =========================================================================
  backend: "kuzu"
  
  # Database path
  # KuzuDB: Directory (e.g., "./data/graph")
  # NetworkX: File (e.g., "./data/graph/graph.graphml")
  graph_path: "./data/graph"
  
  # Graph traversal settings
  max_hops: 2                    # Maximum path length for traversal
  top_k_entities: 5              # Number of graph results
  expand_context: true           # Include surrounding chunks (KuzuDB only)
  
  # Entity extraction method
  # "keyword" - Simple keyword-based (fast, basic)
  # "spacy"   - spaCy NER (requires: pip install spacy)
  # "gliner"  - GLiNER zero-shot NER (requires: pip install gliner)
  entity_extraction_method: "keyword"
  
  # Relationship types stored in graph
  relation_types:
    - "from_source"     # Chunk -> Document
    - "next_chunk"      # Chunk -> Chunk (sequential)
    - "mentions"        # Chunk -> Entity
    - "related_to"      # Entity -> Entity

# ============================================================================
# RETRIEVAL AUGMENTED GENERATION (RAG)
# ============================================================================
rag:
  # =========================================================================
  # RETRIEVAL MODE
  # =========================================================================
  # Options:
  #   "vector" - Vector similarity only (baseline)
  #   "graph"  - Graph traversal only (structural)
  #   "hybrid" - Weighted combination (recommended)
  # =========================================================================
  retrieval_mode: "hybrid"
  
  # =========================================================================
  # HYBRID WEIGHTS - Ablation Study Configuration
  # =========================================================================
  # Experiment 1: Vector-only  → vector_weight=1.0, graph_weight=0.0
  # Experiment 2: Graph-only   → vector_weight=0.0, graph_weight=1.0
  # Experiment 3: Hybrid 70/30 → vector_weight=0.7, graph_weight=0.3
  # Experiment 4: Hybrid 50/50 → vector_weight=0.5, graph_weight=0.5
  # Experiment 5: Graph-heavy  → vector_weight=0.3, graph_weight=0.7
  # =========================================================================
  vector_weight: 0.7
  graph_weight: 0.3

  # RRF Fusion Parameter
  # Note: rrf_k here is consumed by HybridRetriever (data layer) for its own
  # internal fusion pass.  The Navigator (logic layer) reads navigator.rrf_k
  # separately for its RRF fusion over sub-query result lists.  Both keys
  # default to 60 (Cormack et al., 2009) but serve different components and
  # must be maintained independently.
  rrf_k: 60                    # Reciprocal Rank Fusion constant (standard: 60)
  cross_source_boost: 1.2      # Boost for chunks appearing in both retrieval paths

  # Future work options
  reranking_enabled: false
  query_expansion_enabled: false

# ============================================================================
# LLM CONFIGURATION (for Artifact B - Logic Layer)
# ============================================================================
llm:
  # Active model — override with --model flag on CLI
  model_name: "qwen2:1.5b"   # TEST 2026-04-15: phi3 times out on CPU; qwen2:1.5b expected ~10-20s

  base_url: "http://localhost:11434"
  temperature: 0.1    # Low for factual responses
  max_tokens: 200     # Ausreichend für vollständige Antworten
  timeout: 60         # Ollama API Timeout in Sekunden
                      # Modellwahl entscheidet ob 60s reicht — siehe available_models.
                      # phi3 (3.8B): grenzwertig (~45-80s), gemma2:2b: sicher (~20-35s),
                      # qwen2:1.5b: sehr sicher (~10-20s).

  # Context Budget für Verifier (S_V)
  #
  # Der Navigator filtert 10 → max. 8 Chunks (beste nach Relevanz).
  # Der Verifier nimmt daraus nur max_docs Chunks und kürzt jeden auf
  # max_chars_per_doc Zeichen — das ist die eigentliche Kontextreduktion.
  #
  # Warum 3 Docs à 300 chars (= 900 chars total)?
  #   - Navigator hat bereits die relevantesten Chunks ausgewählt
  #   - 300 chars (~75 Wörter) enthält den entscheidenden Fakt für HotpotQA
  #   - 200 chars/doc (alte Einstellung) war zu wenig → Fakt oft abgeschnitten
  #   - 900 chars Gesamtkontext ≈ 225 Tokens Input → phi3 sicher in <55s
  #   - Prompt-Overhead (~150 chars) → ~1050 chars Gesamtinput ans LLM
  max_context_chars: 900    # Gesamtbudget (Sicherheitsnetz)
  max_docs: 3               # Navigator wählt vor, Verifier nimmt Top-3
  max_chars_per_doc: 500    # ~125 words per chunk — increased from 300 to reduce key-sentence loss

# ============================================================================
# NAVIGATOR (S_N) — Pre-Generative Filtering
# ============================================================================
navigator:
  # Relevance Filter: keep chunks with score >= factor × max_rrf_score
  relevance_threshold_factor: 0.85  # raised from 0.6 — score compression 0.74–0.80 made 0.6 keep everything

  # Redundancy Filter: Jaccard similarity threshold for deduplication
  redundancy_threshold: 0.8

  # Maximum chunk count after filtering (before context shrinkage)
  max_context_chunks: 10

  # Reciprocal Rank Fusion smoothing constant (standard: 60)
  # Reference: Cormack et al. (2009). SIGIR. DOI: 10.1145/1571941.1572114
  rrf_k: 60

  # Top-K results per sub-query from HybridRetriever
  top_k_per_subquery: 10

  # Cross-source corroboration boost weights for RRF fusion.
  # A chunk appearing in N sources/M sub-queries receives:
  #   boost = 1 + source_weight*(N-1) + query_weight*(M-1)
  # Empirically tuned on HotpotQA dev set (thesis section 3.3).
  corroboration_source_weight: 0.1
  corroboration_query_weight: 0.05

  # Contradiction filter thresholds (numeric heuristic, original contribution).
  # Two chunks are flagged as contradictory when:
  #   word_overlap > overlap_threshold AND
  #   max(n1,n2)/min(n1,n2) > ratio_threshold AND min(n1,n2) > min_value
  contradiction_overlap_threshold: 0.3
  contradiction_ratio_threshold: 2.0
  contradiction_min_value: 10.0

# ============================================================================
# PLANNER (S_P) — Query Analysis and Plan Generation
# ============================================================================
planner:
  # Minimum NER confidence for entity extraction
  min_entity_confidence: 0.7

  # Maximum number of entities to extract per query
  max_entities: 10

  # Enable bridge entity detection (for multi-hop)
  enable_bridge_detection: true

  # Parse temporal constraints from queries
  enable_temporal_parsing: true

  # ---------------------------------------------------------------------------
  # CLASSIFIER WEIGHT CONSTANTS
  # Empirically tuned on HotpotQA dev set (thesis Section 4.3 ablation).
  # All six values can be varied here without code changes.
  # ---------------------------------------------------------------------------
  # Score bonus for SpaCy Matcher syntactic hits (Phase 2 of classify())
  classifier_spacy_weight: 1.5
  # Score bonus when entity/noun density indicates multi-hop (Phase 3)
  classifier_entity_boost: 0.5
  # Base term in confidence formula: conf = min(cap, base + score * scale)
  classifier_confidence_base: 0.6
  # Score multiplier in confidence formula
  classifier_confidence_scale: 0.15
  # Upper cap on returned classification confidence
  classifier_confidence_cap: 0.95
  # Confidence returned when no pattern matches (SINGLE_HOP fallback)
  classifier_fallback_confidence: 0.8

  # ---------------------------------------------------------------------------
  # ENTITY DENSITY THRESHOLDS (Phase 3 of classify())
  # Queries with more than these counts receive a multi-hop score boost.
  # ---------------------------------------------------------------------------
  entity_density_threshold: 2    # named entity count threshold
  noun_density_threshold: 4      # noun/proper-noun count threshold

  # Confidence assigned to entities found via regex fallback (not SpaCy NER)
  regex_entity_confidence: 0.75

# ============================================================================
# AVAILABLE MODELS (für Multi-Modell-Evaluation und Ablation)
# Hier zentral pflegen — nirgendwo im Code hardcoded.
# Alle Modelle müssen via `ollama pull <name>` installiert sein.
# ============================================================================
available_models:
  # ── Thesis-Vergleichsmodelle (Accuracy-vs-Latency Tradeoff auf Edge-CPU) ──────
  # Alle 4 Modelle decken die SLM-Bandbreite 1.5B–3.8B ab.
  # install: ollama pull <name>

  - name: "qwen2:1.5b"
    description: "Qwen 2 1.5B — schnellstes Modell, sehr sicher in 60s"
    params_b: 1.5
    quantization: "Q4_K_M"
    expected_latency_s: 10   # ~10-20s für 500 Tokens auf CPU
    60s_safe: true

  - name: "gemma2:2b"
    description: "Gemma 2 2B — gutes Qualitäts-/Speed-Verhältnis, Google"
    params_b: 2.0
    quantization: "Q4_K_M"
    expected_latency_s: 25   # ~20-35s für 500 Tokens auf CPU
    60s_safe: true

  - name: "llama3.2:3b"
    description: "Llama 3.2 3B — Meta-Referenz für 3B-Klasse, knapp"
    params_b: 3.0
    quantization: "Q4_K_M"
    expected_latency_s: 45   # ~35-55s für 500 Tokens auf CPU
    60s_safe: true           # meist, bei kleinem Kontext (800 chars)

  - name: "phi3"
    description: "Phi-3 Mini 3.8B — Microsoft Edge-Flaggschiff, grenzwertig bei 60s"
    params_b: 3.8
    quantization: "Q4_K_M"
    expected_latency_s: 55   # ~45-80s für 500 Tokens auf CPU — bei 800 chars meist ok
    60s_safe: false          # bei größerem Kontext riskant

# ============================================================================
# AGENTIC CONTROLLER (Artifact B)
# ============================================================================
agent:
  # Maximum verification iterations in self-correction loop
  # 1 = kein Self-Correction (Baseline), 2 = Thesis-Default (1 Korrektur-Runde)
  max_verification_iterations: 2

  # Enable/disable individual pipeline stages (ablation flags)
  enable_planner: true
  enable_verifier: true

  # FIFO query-result cache (SHA-256-keyed, insertion-order eviction)
  enable_caching: true
  cache_max_size: 1000

# ============================================================================
# QUANTIZATION SETTINGS
# ============================================================================
quantization:
  enabled: true
  bits: 4           # 4-bit quantization (llama.cpp default)
  group_size: 128   # Group size for quantization

# ============================================================================
# DATA PATHS
# ============================================================================
paths:
  root: "./"
  data: "./data"
  documents: "./data/documents"
  vector_db: "./data/vector"
  graph_db: "./data/graph"
  logs: "./logs"
  cache: "./cache"

# ============================================================================
# LOGGING
# ============================================================================
logging:
  level: "INFO"      # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/edge_rag.log"

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================
performance:
  # Embedding batch size (higher = faster ingestion, more memory)
  batch_size: 64
  
  # Number of worker threads for parallel processing
  num_workers: 2
  
  # Compute device: "cpu" or "cuda" (if available)
  device: "cpu"
  
  # Enable embedding cache (SQLite-based)
  cache_embeddings: true
  
  # Maximum cache size in MB
  max_cache_size_mb: 512

# ============================================================================
# BENCHMARK CONFIGURATION (for Thesis Evaluation)
# ============================================================================
benchmark:
  # Available datasets for evaluation
  datasets:
    - "hotpotqa"
    - "2wikimultihop"
    - "strategyqa"
  
  # Default number of samples per dataset
  default_samples: 500
  
  # Ablation study configurations
  ablation_configs:
    - name: "vector_only"
      vector_weight: 1.0
      graph_weight: 0.0
    - name: "graph_only"
      vector_weight: 0.0
      graph_weight: 1.0
    - name: "hybrid_70_30"
      vector_weight: 0.7
      graph_weight: 0.3
    - name: "hybrid_50_50"
      vector_weight: 0.5
      graph_weight: 0.5


# ============================================================================
# VERIFIER (S_V) — Pre-Validation and Self-Correction
# ============================================================================
verifier:
  # ---------------------------------------------------------------------------
  # PRE-GENERATION VALIDATION FLAGS
  # Set enable_contradiction_detection: true only when Transformers is
  # installed — the NLI model (~270 MB) is downloaded on first use.
  # ---------------------------------------------------------------------------
  enable_entity_path_validation: true
  enable_contradiction_detection: false   # Disabled by default (NLI download)
  enable_credibility_scoring: true

  # NLI contradiction detection model and parameters.
  # Reference: Reimers & Gurevych (2019). arXiv:1908.10084.
  nli_model: "cross-encoder/nli-distilroberta-base"
  contradiction_threshold: 0.85    # NLI confidence above which a pair is flagged
  nli_max_input_chars: 200         # Truncation per chunk before NLI (edge CPU)

  # Entity-path validation: minimum fraction of query entities that must
  # appear in the retrieved context for the check to pass.
  entity_coverage_threshold: 0.5

  # Source credibility scoring thresholds.
  min_credibility_score: 0.5       # Chunks below this are filtered

  # Credibility signal weights — must sum to 1.0.
  # Empirically chosen on a HotpotQA dev-set sample; see thesis Section 3.4.
  credibility_weight_cross_ref: 0.4     # Cross-reference corroboration
  credibility_weight_entity_freq: 0.3   # Named-entity density
  credibility_weight_provenance: 0.3    # Graph vs. vector retrieval origin

  # Credibility scoring normalisation constants.
  credibility_cross_ref_max: 3.0        # Divisor for cross-reference count
  credibility_provenance_baseline: 0.5  # Score for vector-only (non-graph) chunks

  # SpaCy processing limit inside credibility scoring (edge CPU budget).
  spacy_max_chars: 500

  # ConfidenceLevel thresholds for VerificationResult.confidence property.
  # A verified-claim ratio >= high_threshold → HIGH, >= medium_threshold → MEDIUM.
  confidence_high_threshold: 0.8
  confidence_medium_threshold: 0.5

  # Claim extraction and entity verification limits.
  min_claim_chars: 15       # Minimum characters for a sentence to count as a claim
  max_entities_to_verify: 5 # Max entities checked per claim during verification
  max_key_phrases: 10       # Max key phrases per chunk in cross-reference scoring

# ============================================================================
# INGESTION CONFIGURATION
# ============================================================================
ingestion:
  # Verfügbare Strategien: sentence | sentence_spacy | semantic | fixed | recursive
  chunking_strategy: "sentence_spacy"

  # Sentence-Strategie
  sentences_per_chunk: 3
  sentence_overlap: 1       # Überlappende Sätze (nur sentence_spacy)

  # Fixed/Recursive/Semantic-Strategie
  chunk_size: 1024
  chunk_overlap: 128
  min_chunk_size: 50

  # Semantic-Strategie
  min_lexical_diversity: 0.3
  min_information_density: 2.0

  # Fixed Chunking: Wortgrenzen-Heuristik
  # Brich am letzten Leerzeichen, wenn es in den letzten (1 - factor) * chunk_size Zeichen liegt.
  # 0.8 = brich am Wort, sofern das Leerzeichen im letzten 20% des Chunks liegt.
  word_boundary_factor: 0.8

  # Maximum character length per sentence-based chunk (SpacySentenceChunker)
  max_chunk_chars: 2000

  # SpaCy-spezifisch
  spacy_model: "en_core_web_sm"
  entity_aware_chunking: false

  # Quality Filter thresholds (AutomaticQualityFilter — semantic chunking only)
  quality_filter:
    min_length: 100   # Minimum characters per chunk
    min_words: 15     # Minimum word count per chunk

  # Metadata & Entity Extraction
  extract_entities: true
  add_source_metadata: true

# ============================================================================
# ENTITY EXTRACTION (GLiNER + REBEL)
# ============================================================================
entity_extraction:

  # GLiNER Named Entity Recognition
  # Reference: Zaratiana et al. (2023). arXiv:2311.08526.
  gliner:
    model_name: "urchade/gliner_small-v2.1"
    entity_types:
      - "person"
      - "organization"
      - "city"
      - "country"
      - "state"
      - "location"
      - "film"
      - "movie"
      - "album"           # music albums (Abbey Road etc.)
      - "work of art"     # catch-all for unusual titles, paintings, books
      - "landmark"        # buildings/monuments → maps to LOCATION
      - "event"
      - "award"
    confidence_threshold: 0.15   # recall-optimised for HotpotQA
    batch_size: 16

  # REBEL Relation Extraction
  # Reference: Cabot & Navigli (2021). EMNLP 2021 Findings.
  rebel:
    model_name: "Babelscape/rebel-large"
    confidence_threshold: 0.5    # uniform sentinel — REBEL emits no per-triplet score
    batch_size: 8                # reserved for future batched implementation
    min_entities_for_re: 2       # skip RE when fewer entities are found (~60% reduction)
    max_input_length: 256        # tokenizer truncation length
    max_output_length: 256       # generation length cap
    num_beams: 5                 # beam search width

  # Entity Caching (in-memory LRU + SQLite persistent store)
  caching:
    enabled: true
    cache_path: "./data/entity_cache.db"
    lru_cache_size: 10000
