[pytest]
# CI profile (default): stop after first failure, short tracebacks, quiet.
addopts = -x --tb=short -q

# Custom markers — must be declared to avoid PytestUnknownMarkWarning.
markers =
    slow: Tests that take > 30 seconds (KuzuDB population, full ingestion runs)
    nightly: Tests that should only run in the nightly CI pass with full data (EDGE_RAG_N_SAMPLES=10)
    llm: Tests that require a live Ollama connection and real LLM inference
    integration: Tests that combine multiple layers end-to-end

# Nightly profile — run with:
#   python -X utf8 -m pytest -m "nightly or llm" --timeout=900 -p no:randomly -q
# Or in CI (parallel, 6 h cap):
#   python -X utf8 -m pytest -m "nightly or llm" --timeout=900 -n auto --dist=loadscope -q
# Set EDGE_RAG_N_SAMPLES=10 to enable full GLiNER/recall evaluation corpus.

# Suppress noisy DeprecationWarnings from heavy third-party libraries.
# These are not actionable for this project; suppress to keep pytest output
# focused on actual test failures.
filterwarnings =
    ignore::DeprecationWarning:lancedb
    ignore::DeprecationWarning:torch
    ignore::DeprecationWarning:huggingface_hub
    ignore::DeprecationWarning:transformers
